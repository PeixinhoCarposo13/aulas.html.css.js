<!-- No Cabeçalho de todo documento HTML tem que ter a tag <!DOCTIPE html> 
que mostra a versão do HTMl que está sendo usado-->
<!DOCTYPE html>

<!--A segunda Tag que deve ser utilizada é a tag "html"-->
<html></html>

<!--Dentro ta tag html pode ser usado o atributo "lang" para especificar o idioma do documento-->
<html lang="pt-br"></html>

<!--Para começar a construção, é necessário começar pelos elementos não visuais
assim devemos começar nossa construção utilizando a tag "head"-->
<head></head>

<!--Use a tag "title" dentro do "head" para escrever o titulo do site que vai 
aparecer somente na barra de pesquisa-->
<title></title>

<!--UTF-8 é uma codificação universal que suporta praticamente todos 
os caracteres e símbolos usados em diferentes idiomas (acentos, ideogramas, emojis, etc.).
Ao incluir essa meta tag no <head> do documento, o navegador sabe como interpretar corretamente 
os caracteres exibidos na página.-->
<meta charset="UTF-8">

<!--Para construir os elementos visuais do nosso código deve se escrever dentro da tag "body"-->
<body></body>

<!--Use a tag "header" para criar o cabeçalho do seu site-->
<header></header>

<!--Para escrever os textos em ordem de grandeza, utiliza-se a tag "h1 até h6" sendo na ordem
do mais destacado até o menos destacado, por regra só se usa apenas um h1 em todo o código-->
<h1>Cabeçalho 1</h1>
<h2>Cabeçalho 2</h2>
<h3>Cabeçalho 3</h3>
<h4>Cabeçalho 4</h4>
<h5>Cabeçalho 5</h5>
<h6>Cabeçalho 6</h6>

<!--Para subdividir em paragrafos use a tag "p"-->
<p>Hello World</p>

<!--Use a tag "hr" para criar uma linha horizontal para subdividir assuntos-->
<hr>

<!--Use a tag "strong" para deixar um texto em negrito( Esse é o jeito mais recomendado)-->
Hello <strong>World</strong>

<!-- Para deixar um texto em negrito use a tag "b"-->
Hello <b>World</b>

<!--Use a tag "em" para deixar um texto em italico( Esse é o jeito mais recomendado)-->
Hello <em>World</em>

<!-- Para deixar um texto em italico use a tag "i"-->
Hello <i>World</i>

<!--Use a tag "mark" para destacar um texto-->
Hello <mark>World</mark>

<!-- Para deixar um texto com underline use a tag "u"-->
Hello <u>World</u>

<!-- Para deixar um texto com uma linha horisontal atravessando ele use a tag "strike"-->
Hello <strike>World</strike>

<!--Para deletar um texto use a tag "del"-->
Hello <del>World</del>

<!--Use a tag "sub" para deixar um texto em subscrito-->
H<sub>2</sub>O

<!--Use a tag "sup" para deixar um texto em sobrescrito-->
10<sup>2</sup>

<!--Use a tag "br" para quebrar um texto, ou seja pular uma linha-->
Hello <br> World
