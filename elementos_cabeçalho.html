<!DOCTYPE html>
<!--Dentro ta tag html pode ser usado o atributo "lang" para especificar o idioma do documento-->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>

<body>
    <!--Use a tag "header" para criar o cabeçalho do seu site-->
    <header>
        <!--Use a tag "h1" para criar o cabeçalho principal do seu site-->
        <h1>Esse é o cabeçalho do meu site</h1>
        <!--Use a tag "p" para criar um parágrafo no cabeçalho do seu site-->
        <p>Esse é o paragrafo do meu cabeçalho</p>
    </header>
</body>

</html>
