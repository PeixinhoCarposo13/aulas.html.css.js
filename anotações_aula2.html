<!--Use a tag "ul" para criar uma lista não ordenada-->
<ul></ul>

<!--Dentro de "ul" podemos escolher o formato do marcador utilizando "type=" ""
temos os tipos "circle, square, disc"-->
<ul type="circle"></ul>

<!--**Esse é mais recomendado** Dentro de "ul" podemos escolher o formato do marcador utilizando "style= "list-style-type:"
temos os tipos-->
<ul style="list-style-type: circle;"></ul>

<!--Use a tag "ol" para criar uma lista ordenada-->
<ol></ol>

<!--Dentro de "ol" podemos escolher o formato do marcador utilizando "type=" ""
temos os tipos "1,A,a,I,i"-->
<ol type="I"></ol>

<!--**Esse é mais recomendado** Dentro de "ol" podemos escolher o formato do marcador utilizando "style= "list-style-type:"
temos os tipos-->
<ol style="list-style-type: upper-roman;"></ol>

<!--Dentro de "ul" ou "ol" para criar os elementos se usa "li"-->
<li></li>

<!-- Para criar subcategorias posso colocar um tag "ul" dentro do outro-->
 <ul><li>item 1</li><ul><li>Sub-item 1</li></ul></ul>

 <!--Use a tag "img" para adicionar imagens, na tag "src" coloque o local da imagem pode ser o endereço
da imagem no google ou o local da imagem baixadac no pc (de prferencia em uma pasta dentro da pasta do projeto),
tag "alt" é a mensage que vai aparecer caso a imagem não apareça carregada,
tag "width" serve para definir a largura da imagem,
tag "height" serve para definir a altura-->
 <img src="" alt="" width="" height="">
